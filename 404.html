<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ops! Piatto Finito – 404</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root { --gold: #d4af37; --bg: #0c0c0c; --text: #f0ebd8; }
    body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; text-align: center; }
    .container { max-width: 600px; padding: 20px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 4rem; color: var(--gold); margin: 0; }
    p { font-size: 1.1rem; color: #a0a0a0; margin: 20px 0 40px; line-height: 1.6; }
    
    /* ── BROKEN PLATE ANIMATION ── */
    .plate-wrap { position: relative; width: 200px; height: 200px; margin: 0 auto 50px; }
    .plate { width: 170px; height: 170px; background: #fff; border-radius: 50%; border: 8px solid #eee; position: absolute; top: 0; left: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform-origin: center bottom; animation: fall 1s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; }
    
    .piece { position: absolute; background: #fff; border: 2px solid #eee; opacity: 0; }
    .p1 { width: 80px; height: 90px; border-radius: 40% 10% 40% 10%; top: 50px; left: 10px; transform: rotate(-20deg); }
    .p2 { width: 70px; height: 80px; border-radius: 10% 40% 10% 40%; top: 60px; right: 10px; transform: rotate(15deg); }
    .p3 { width: 40px; height: 40px; border-radius: 50%; bottom: 10px; left: 70px; }

    @keyframes fall {
      0% { transform: translateY(-500px) rotate(0deg); opacity: 1; }
      90% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(0) scale(0); opacity: 0; }
    }
    
    .broken-pieces { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .plate-broken .piece { opacity: 1; animation: scatter 0.6s ease-out forwards; }
    
    @keyframes scatter {
      0% { transform: translate(0, 0) rotate(0); opacity: 1; }
      100% { transform: translate(var(--x), var(--y)) rotate(var(--r)); opacity: 1; }
    }

    .home-btn { background: var(--gold); color: #000; text-decoration: none; padding: 14px 32px; border-radius: 30px; font-weight: 700; transition: 0.3s; display: inline-block; }
    .home-btn:hover { transform: scale(1.05); background: #f3d881; }
  </style>
</head>
<body>
  <div class="container">
    <div class="plate-wrap" id="plateContainer">
      <div class="plate" id="mainPlate"></div>
      <div class="broken-pieces" id="pieces">
        <div class="piece p1" style="--x:-60px; --y:20px; --r:-45deg;"></div>
        <div class="piece p2" style="--x:70px; --y:30px; --r:50deg;"></div>
        <div class="piece p3" style="--x:10px; --y:80px; --r:120deg;"></div>
      </div>
    </div>
    <h1>Ops! Piatto Finito.</h1>
    <p>Questo piatto &egrave; andato in mille pezzi.<br>Lo chef sta preparando qualcosa di nuovo, nel frattempo torna al menu principale!</p>
    <a href="index.html" class="home-btn">Torna alla Home</a>
  </div>

  <script>
    setTimeout(() => {
      document.getElementById('plateContainer').classList.add('plate-broken');
    }, 900);
  </script>
</body>
</html>
